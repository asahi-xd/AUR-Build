name: AUR Package Builder

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'AUR package to build'
        required: true
jobs:
  build-aur:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Package inside Arch Linux Container
        run: |
          # Define the target package
          export TARGET_PKG="${{ github.event.inputs.package_name }}"
          echo "Target package set to: $TARGET_PKG"
          
          # 1. Use -e TARGET_PKG="$TARGET_PKG" to pass the variable into Docker
          # 2. Swap to single quotes for the outer docker bash command to avoid premature expansion
          docker run --rm -e TARGET_PKG="$TARGET_PKG" -v ${{ github.workspace }}:/workspace archlinux:base /bin/bash -c '
            # Update system and install base development tools
            pacman-key --init

            pacman -Syu --noconfirm base-devel git sudo
            
            # Create a generic builder user
            useradd -m builder
            echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
            chmod -R a+rw /workspace
            
            # Switch to the non-root user context
            # Use --preserve-env to keep only TARGET_PKG, and force HOME to the builder directory
            sudo --preserve-env=TARGET_PKG -u builder HOME=/home/builder bash -c "
              cd /workspace
              git clone https://aur.archlinux.org/${TARGET_PKG}.git
              cd ${TARGET_PKG}
              
              # Download dependencies, compile code, and package without prompting
              makepkg -s --noconfirm
            "
          '
      - name: Upload Compiled Package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.package_name || 'gtk2' }}-binary-package
          path: |
            **/*.pkg.tar.zst
